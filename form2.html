<!DOCTYPE html>
<html>
    <head>
        <title>
            Service Order Form
        </title>
    </head>
    <body>
        <h1>Service Order Form</h1>
        <form>
            <fieldset>
                <legend>Customer Information</legend>

                <label for="fname">First Name:</label>
                <input type="text " id="fname" name="fname"><br><br>

                <label for="lname">Last Name:</label>
                <input type="text" id="lname" name="lname"><br><br>

                <label for="email" >Email</label>
                <input type="email" id="email" name="email"><br><br>

                <label for="pw" >Password:</label>
                <input type="password" id="password" name="password"><br><br>
                
                <label for="date">Order Date:</label>
                <input type="date" id="date" name="date" ><br><br>
            </fieldset>

            <fieldset>
                <legend>Service Details</legend>
                
                <label for="Service">Choose Service:</label>
                <select id="Service" name="Service">

                    <option value="Web">Web Design</option>
                    <option value="Photo">Photography</option>
                    <option value="video">Video Editing</option>
                    <option value="music">Music Classes</option>
                    <option value="tuition">Home Tuition</option>
                </select><br><br>

                <label>Serive Type:</label><br>
                <input type="radio" id="basic" name="type" value="basic">

                <label for="basic">Basic</label>
                <input type="radio" id="premium" name="type" value="premium">

                <label for="premium">Premium:</label>
                <br><br>
                
                 <label>Extra Features:</label><br>
                <input type="checkbox" id="support" name="feature" value="support">

                <label for="support">24/7 Support</label>
                <input type="checkbox" id="fast" name="feature" value="fast">

                <label for="fast">Fast Delivery:</label>
                <br><br>

                <label for="message">Additional Message</label><br>
                <textarea id="message" name="message" rows="5" cols="30">Write Your Message</textarea>
            </fieldset><br>
            <button type="Submit" onclick="alert(THANK YOU)">Submit</button>
            
            <input type="Reset" value="Reset">
            <br><br>

            <input type="image" src="download.jpg" alt="download" width="150">
        </form>
    </body>
</html>
